<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Football</title>
<meta name="description" content="Short-form football commentary, reactions and debate clips — every day, across YouTube Shorts and TikTok.">
<meta property="og:title" content="Universal Football">
<meta property="og:description" content="The football moments worth arguing about.">
<meta property="og:image" content="assets/banner.png">
<link rel="icon" type="image/png" href="assets/logo.png">
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #070b14; color: #edeaf0; min-height: 100vh; display: flex; flex-direction: column; }
  main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 48px 24px; background: radial-gradient(ellipse at 50% 30%, #101a30 0%, #070b14 65%); }
  .logo { width: clamp(140px, 30vw, 220px); height: auto; border-radius: 50%; box-shadow: 0 0 60px rgba(230, 185, 80, 0.35); }
  h1 { font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: -0.02em; margin-top: 24px; }
  h1 span { background: linear-gradient(120deg, #f5d67b, #d4a437); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p.tag { color: #9aa3b5; max-width: 520px; margin-top: 12px; font-size: 1.05rem; }
  .links { margin-top: 28px; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .links a { color: #14100a; background: linear-gradient(120deg, #f5d67b, #d4a437); text-decoration: none; padding: 10px 24px; border-radius: 999px; font-weight: 650; }
  .links a.alt { background: transparent; color: #edeaf0; border: 1px solid #3a4356; }
  footer { text-align: center; padding: 20px; color: #5f6879; font-size: 0.85rem; }
  footer a { color: #9aa3b5; text-decoration: none; margin: 0 8px; }
</style>
</head>
<body>
<main>
  <img class="logo" src="assets/logo.png" alt="Universal Football logo — golden football in orbit">
  <h1>Universal <span>Football</span></h1>
  <p class="tag">Short-form football commentary, reactions and debate clips. The moments worth arguing about — every day, across YouTube Shorts and TikTok.</p>
  <div class="links">
    <a href="https://www.youtube.com/channel/UCvqF5WVYLFOnhuDdwrS8h4A">YouTube</a>
    <a class="alt" href="https://www.tiktok.com/@universallyfootball">TikTok</a>
  </div>
</main>
<footer>
